<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="planet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="50%" stop-color="#8B45E8"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e879f9"/>
      <stop offset="50%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <clipPath id="back">
      <circle cx="32" cy="32" r="16"/>
    </clipPath>
    <clipPath id="frontmask">
      <rect x="0" y="0" width="64" height="64"/>
    </clipPath>
  </defs>
  <!-- ring back half (behind planet) - clipped by planet circle -->
  <g transform="rotate(-30 32 32)">
    <ellipse cx="32" cy="32" rx="28" ry="8" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.35"/>
  </g>
  <!-- planet body (covers back ring) -->
  <circle cx="32" cy="32" r="16" fill="url(#planet)"/>
  <!-- planet highlight -->
  <circle cx="27" cy="26" r="6" fill="white" opacity="0.15"/>
  <!-- ring front half (in front of planet) -->
  <g transform="rotate(-30 32 32)">
    <ellipse cx="32" cy="32" rx="28" ry="8" fill="none" stroke="url(#ring)" stroke-width="3.5" stroke-dasharray="88 88" stroke-dashoffset="-88"/>
  </g>
</svg>
